# ============================================================
# NGINX CONFIGURATION FOR YOUTH WELFARE SYSTEM
# Secure File Storage with X-Accel-Redirect
# ============================================================

server {
    listen 80;
    server_name yourdomain.com;  # Replace with your actual domain
    
    # Maximum upload size (adjust as needed)
    client_max_body_size 20M;

    # Django application (proxy to Gunicorn/uWSGI)
    location / {
        proxy_pass http://127.0.0.1:8000;  # Adjust port if needed
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts for large file uploads
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # ============================================================
    # PUBLIC MEDIA FILES (Event Images)
    # Accessible directly - no authentication required
    # ============================================================
    location /media/public/ {
        alias /path/to/your/project/media/public/;  # UPDATE THIS PATH
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
        
        # Allow CORS if needed for frontend
        add_header Access-Control-Allow-Origin *;
    }

    # ============================================================
    # PRIVATE MEDIA FILES (Solidarity & Student Documents)
    # Internal location - only accessible via X-Accel-Redirect from Django
    # ============================================================
    location /protected/ {
        internal;  # This makes it inaccessible from outside
        alias /path/to/your/project/media/private/;  # UPDATE THIS PATH
        
        # Security headers
        add_header X-Content-Type-Options "nosniff";
        add_header X-Frame-Options "DENY";
    }

    # ============================================================
    # STATIC FILES (CSS, JS, Images)
    # ============================================================
    location /static/ {
        alias /path/to/your/project/staticfiles/;  # UPDATE THIS PATH
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ============================================================
    # SECURITY HEADERS
    # ============================================================
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ============================================================
    # ERROR PAGES
    # ============================================================
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}

